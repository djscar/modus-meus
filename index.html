<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODUS MEUS — Language Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F6F3ED;
            --surface: #FFFDF9;
            --card: #FFFFFF;
            --accent: #C8553D;
            --accent-hover: #A8432E;
            --accent-dim: rgba(200, 85, 61, 0.06);
            --accent-glow: rgba(200, 85, 61, 0.12);
            --text: #1A1A1A;
            --text-mid: #5A5A5A;
            --text-light: #9A9A9A;
            --border: #E8E3DB;
            --border-strong: #D0C9BE;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-pill: 100px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── NAVIGATION ─── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 48px;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--text);
        }

        .language-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: var(--accent-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .language-badge:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .nav-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .nav-tab {
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 7px 16px;
            border-radius: var(--radius-pill);
            text-decoration: none;
            color: var(--text-mid);
            transition: all var(--transition);
            border: none;
            border-bottom: none;
        }

        .nav-tab:hover {
            color: var(--text);
            background: var(--accent-dim);
        }

        .nav-tab.active {
            color: #fff;
            background: var(--text);
            border-bottom-color: transparent;
        }

        /* ─── QUIZ / ONBOARDING ─── */
        .quiz-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 26, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .quiz-card {
            background: var(--card);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            padding: 48px 40px;
            position: relative;
            box-shadow: var(--shadow-lg);
            border: none;
            border-left: none;
            overflow: hidden;
        }

        .quiz-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #E07B5F);
            transition: width 0.4s ease;
            border-radius: 0 3px 3px 0;
        }

        .quiz-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            margin-top: 16px;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .quiz-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            margin-bottom: 20px;
            transition: border-color var(--transition), box-shadow var(--transition);
            background: var(--surface);
        }

        .quiz-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .language-tiles {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .tile {
            padding: 24px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            background: var(--surface);
            transition: all var(--transition);
        }

        .tile:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .tile.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .tile.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .tile-emoji {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .quiz-multi-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .checkbox-tile {
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
        }

        .checkbox-tile input {
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checkbox-tile:hover {
            border-color: var(--accent);
        }

        .checkbox-tile.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .quiz-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: all var(--transition);
        }

        .btn:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(200, 85, 61, 0.25);
        }

        /* ─── LAYOUT ─── */
        .hidden {
            display: none !important;
        }

        main {
            margin-top: 96px;
            max-width: 940px;
            margin-left: auto;
            margin-right: auto;
            padding: 40px 24px 80px;
        }

        /* ─── DASHBOARD ─── */
        .welcome-section {
            margin-bottom: 64px;
        }

        .welcome-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.03em;
            line-height: 1.05;
        }

        .user-info {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 16px;
            background: var(--accent-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            font-weight: 500;
            font-size: 13px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .tile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 24px;
            position: relative;
            cursor: pointer;
            transition: all var(--transition);
            overflow: hidden;
        }

        .tile-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .tile-card-number {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 7rem;
            opacity: 0.04;
            font-weight: 700;
            line-height: 1;
        }

        .tile-card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 17px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            letter-spacing: -0.01em;
        }

        .tile-card-progress {
            font-size: 12px;
            color: var(--text-light);
            position: relative;
            z-index: 1;
        }

        .streak-counter {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 28px;
            padding: 16px 20px;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: inline-block;
        }

        /* ─── EXPANDABLE ROWS ─── */
        .expandable-row {
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
            cursor: pointer;
            transition: background var(--transition);
        }

        .expandable-row:hover {
            background: var(--accent-dim);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: var(--radius-sm);
        }

        .expandable-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .expandable-row-title {
            font-weight: 600;
            font-size: 15px;
        }

        .expandable-row-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--border);
            transition: background var(--transition);
        }

        .progress-dot.filled {
            background-color: var(--accent);
        }

        .tag {
            padding: 3px 10px;
            background: var(--accent-dim);
            font-size: 11px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
        }

        .arrow {
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .arrow.open {
            transform: rotate(90deg);
        }

        .expandable-content {
            display: none;
            padding: 24px 0;
            border-top: 1px solid var(--border);
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.85;
        }

        .expandable-content.open {
            display: block;
        }

        .linguistics-content {
            margin-bottom: 24px;
        }

        .linguistics-header {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 15px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .linguistics-text {
            color: var(--text-mid);
            margin-bottom: 14px;
            font-size: 14px;
        }

        .ipa-example {
            background: var(--surface);
            padding: 14px 16px;
            margin: 10px 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            line-height: 1.8;
        }

        .vocab-note {
            background: #FFF8F0;
            padding: 14px 16px;
            margin: 14px 0;
            border: none;
            border-left: 3px solid #E8A020;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 13px;
        }

        .exercise {
            background: var(--surface);
            padding: 20px;
            margin: 20px 0;
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .exercise-text {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .exercise-input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: border-color var(--transition);
        }

        .exercise-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .exercise-button {
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            transition: all var(--transition);
        }

        .exercise-button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .exercise-feedback {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .feedback-correct {
            color: #2D8A4E;
        }

        .feedback-incorrect {
            color: var(--accent);
        }

        /* ─── DIALOGS ─── */
        .dialog-scenario {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .dialog-scenario:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .dialog-title {
            font-weight: 600;
            font-size: 15px;
        }

        .dialog-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }

        .dialog-content {
            display: none;
        }

        .dialog-content.open {
            display: block;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .dialog-line {
            margin-bottom: 16px;
            display: flex;
            gap: 14px;
        }

        .dialog-speaker {
            font-weight: 700;
            min-width: 120px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            padding-top: 2px;
        }

        .dialog-text-pair {
            flex: 1;
        }

        .dialog-italian {
            font-size: 14px;
            margin-bottom: 4px;
            line-height: 1.65;
        }

        .dialog-english {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 12px;
            line-height: 1.65;
        }

        .dialog-vocab {
            background: var(--accent-dim);
            padding: 14px;
            margin-top: 16px;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .translation-toggle {
            margin: 16px 0;
            font-size: 12px;
        }

        .toggle-btn {
            padding: 7px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .practice-mode-btn {
            padding: 12px 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all var(--transition);
        }

        .practice-mode-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(200, 85, 61, 0.25);
        }

        .level-filter {
            margin-bottom: 24px;
            display: flex;
            gap: 8px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ─── RESOURCES ─── */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .resource-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all var(--transition);
        }

        .resource-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .resource-category-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .resource-item {
            margin-bottom: 12px;
            font-size: 13px;
        }

        .resource-link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .resource-link:hover {
            text-decoration: underline;
        }

        .resource-description {
            color: var(--text-light);
            font-size: 12px;
            margin-top: 4px;
        }

        .resource-level-tag {
            display: inline-block;
            background: var(--accent-dim);
            padding: 2px 8px;
            font-size: 11px;
            margin-top: 4px;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
        }

        /* ─── JOURNAL ─── */
        .journal-layout {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 16px;
        }

        .journal-writing {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .journal-textarea {
            width: 100%;
            min-height: 400px;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: vertical;
            line-height: 1.8;
            transition: border-color var(--transition);
        }

        .journal-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .journal-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 13px;
        }

        .word-count {
            color: var(--text-light);
            font-weight: 500;
        }

        .journal-save-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all var(--transition);
        }

        .journal-save-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .journal-sidebar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .journal-prompt {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .journal-prompt-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 8px;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-mid);
        }

        .journal-prompt-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.7;
        }

        .random-prompt-btn {
            padding: 10px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            margin-bottom: 20px;
            transition: all var(--transition);
        }

        .random-prompt-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .category-filter-journal {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .category-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .category-option input {
            cursor: pointer;
            accent-color: var(--accent);
        }

        .past-entries {
            font-size: 13px;
        }

        .past-entries-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-mid);
        }

        .past-entry {
            padding: 10px 12px;
            background: var(--surface);
            margin-bottom: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all var(--transition);
        }

        .past-entry:hover {
            border-color: var(--accent);
        }

        .level-note {
            background: var(--surface);
            padding: 14px 18px;
            margin-bottom: 24px;
            border: 1px solid var(--border);

        }

        .level-note.show {

            cursor: pointer;

            text-decoration: underline;
            font-weight: 500;
        }

        .dimmed {
            opacity: 0.45;
            transition: opacity var(--transition);
        }

        .dimmed:hover {
            opacity: 0.8;
        }

        /* ─── SECTION HEADINGS ─── */
        section h2 {
            font-family: 'Space Grotesk', sans-serif !important;
            font-size: 42px !important;
            font-weight: 700 !important;
            letter-spacing: -0.03em !important;
            margin-bottom: 36px !important;

        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            nav {

            }

                flex-wrap: wrap;

            }

            main {
                margin-top: 120px;

            }

            .welcome-text {
                font-size: 36px;
            }

            section h2 {
                font-size: 32px !important;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .journal-layout {
                grid-template-columns: 1fr;
            }

            .language-tiles {
                grid-template-columns: 1fr;
            }

            .quiz-multi-select {
                grid-template-columns: 1fr;
            }

            .quiz-card {
                margin: 16px;
                padding: 32px 24px;
