        }

        /* ─── COMPONENT OVERRIDES ─── */
        .ex-input { width:200px; padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--surface); font-family:'Inter',sans-serif; font-size:14px; margin-right:8px; transition:border-color var(--transition); }
        .ex-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
        .ex-btn { padding:8px 16px; background:transparent; border:1.5px solid var(--border); border-radius:var(--radius-pill); font-family:'Inter',sans-serif; cursor:pointer; font-size:13px; font-weight:500; transition:all var(--transition); }
        .ex-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
        .exercise-block { margin-top:20px; padding:20px; background:var(--surface); border-radius:var(--radius-sm); border-top:none; border:1px solid var(--border); }
        .ex-q { font-size:14px; color:var(--text); margin-bottom:10px; margin-top:16px; font-family:'Inter',sans-serif; }
        .conj-table { width:100%; border-collapse:separate; border-spacing:0; margin:14px 0; font-size:13px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
        .conj-table th { background:var(--surface); font-weight:600; text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-mid); }
        .conj-table td { padding:9px 14px; border-bottom:1px solid var(--border); font-family:'Space Grotesk',sans-serif; font-size:13px; }
        .conj-table tr:last-child td { border-bottom:none; }
        .conj-table tr:nth-child(even) td { background:var(--surface); }

        .dialog-filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
        .dialog-card { background:var(--card); border:1px solid var(--border); margin-bottom:8px; border-radius:var(--radius); overflow:hidden; transition:all var(--transition); }
        .dialog-card:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); }
        .dialog-card-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; gap:14px; transition:all var(--transition); }
        .dialog-card-header:hover { border-left:3px solid var(--accent); padding-left:17px; }
        .dialog-card-title { font-weight:600; font-size:1rem; flex:1; }
        .dialog-level-tag { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-light); background:var(--surface); padding:3px 8px; margin-right:6px; border-radius:var(--radius-pill); }
        .dialog-cat-tag { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:500; }
        .dialog-body { padding:24px 20px; background:var(--surface); border-top:1px solid var(--border); }
        .dlg-line { display:flex; gap:16px; margin-bottom:16px; align-items:flex-start; }
        .dlg-speaker { font-weight:700; font-size:11px; color:var(--accent); min-width:90px; text-transform:uppercase; letter-spacing:0.08em; padding-top:3px; }
        .dlg-it { font-family:'Space Grotesk',sans-serif; font-size:14px; color:var(--text); margin-bottom:4px; font-weight:500; }
        .dlg-en { font-size:12px; color:var(--text-mid); font-style:italic; }
        .dlg-tool-btn { padding:6px 14px; border:1px solid var(--border); background:transparent; border-radius:var(--radius-pill); font-family:'Inter',sans-serif; font-size:11px; font-weight:500; cursor:pointer; margin-right:6px; margin-bottom:14px; text-transform:uppercase; letter-spacing:0.05em; transition:all var(--transition); }
        .dlg-tool-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
        .dialog-vocab-box { margin-top:18px; padding:14px 16px; background:var(--card); border:1px solid var(--border); font-size:13px; line-height:1.8; border-left:3px solid var(--accent); border-radius:0 var(--radius-sm) var(--radius-sm) 0; }
        .dialog-toolbar { margin-bottom:10px; }
        .progress-dot.started { background:var(--accent); opacity:0.4; }
        .progress-dot.completed { background:var(--accent) !important; }

        .resource-section { margin-bottom:32px; }
        .resource-cat-title { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-mid); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
        .resource-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
        .resource-card { background:var(--card); border:1px solid var(--border); padding:18px; border-radius:var(--radius); transition:all var(--transition); }
        .resource-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow-sm); }
        .resource-name { font-weight:600; font-size:14px; margin-bottom:8px; }
        .resource-name a { color:var(--text); text-decoration:none; transition:color var(--transition); }
        .resource-name a:hover { color:var(--accent); }
        .resource-desc { font-size:12px; color:var(--text-mid); line-height:1.65; margin-bottom:10px; }
        .resource-level { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); background:var(--accent-dim); padding:3px 8px; border-radius:var(--radius-pill); font-weight:500; }
        .resources-note { font-size:13px; color:var(--text-mid); margin-bottom:20px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }

        .lang-switcher { position:relative; }
        #lang-badge { cursor:pointer; padding:5px 14px; border:1px solid var(--border); border-radius:var(--radius-pill); font-size:13px; font-weight:600; letter-spacing:0.05em; transition:all var(--transition); }
        #lang-badge:hover { border-color:var(--accent); background:var(--accent-dim); }
        #lang-dropdown { display:none; position:absolute; top:calc(100% + 8px); right:0; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); min-width:180px; z-index:200; box-shadow:var(--shadow-lg); overflow:hidden; }
        #lang-dropdown.open { display:block; }
        .lang-option { padding:12px 16px; font-size:13px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:background var(--transition); }
        .lang-option:hover { background:var(--accent-dim); }
        .lang-option.active { color:var(--accent); font-weight:600; }
        .lang-option .lang-prog { font-size:11px; color:var(--text-light); }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }

        /* ─── SELECTION ─── */
        ::selection { background: var(--accent-glow); color: var(--text); }
        </style>
</head>
<body>
    <!-- Quiz Overlay -->
    <div id="quizOverlay" class="quiz-container">
        <div class="quiz-card">
            <div class="quiz-progress" id="quizProgress"></div>
            <div id="quizContent"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="navigation" class="hidden">
        <div class="nav-left">
            <div class="nav-brand">MODUS MEUS</div>
            <div class="language-badge" id="languageBadge">
                <span id="currentLanguageEmoji">🇮🇹</span>
                <span id="currentLanguageText">Italian</span>
            </div>
        </div>
        <div class="nav-right">
            <a class="nav-tab active" data-tab="dashboard">Dashboard</a>
            <a class="nav-tab" data-tab="linguistics">Linguistics</a>
            <a class="nav-tab" data-tab="grammar">Grammar</a>
            <a class="nav-tab" data-tab="dialogs">Dialogs</a>
            <a class="nav-tab" data-tab="resources">Resources</a>
            <a class="nav-tab" data-tab="journal">Journal</a>
        </div>
    <div class="lang-switcher">
                    <span id="lang-badge" onclick="document.getElementById('lang-dropdown').classList.toggle('open')">🇮🇹 IT</span>
                    <div id="lang-dropdown">
                        <div class="lang-option active" onclick="switchLanguage('italian')">🇮🇹 Italian <span class="lang-prog">active</span></div>
                        <div class="lang-option" onclick="switchLanguage('french')">🇫🇷 French</div>
                        <div class="lang-option" onclick="switchLanguage('catalan')">🏴 Catalan</div>
                    </div>
                </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent" class="hidden">
        <!-- Dashboard Section -->
        <section id="dashboardSection" class="tab-content">
            <div class="welcome-section">
                <div class="welcome-text" id="welcomeText">Ciao, User</div>
                <div class="user-info">
                    <div class="badge" id="levelBadge">C1-C2</div>
                    <div id="goalChips"></div>
                </div>
            </div>

            <div class="streak-counter">🔥 <span id="streakDays">0</span> giorni</div>

            <div class="dashboard-grid" id="dashboardGrid"></div>

            <div class="level-note" id="levelNote">
                <strong>Showing content for C1-C2 level</strong> — <span class="show-all-levels-toggle" onclick="toggleAllLevels()">show all</span>
            </div>
        </section>

        <!-- Linguistics Section -->
        <section id="linguisticsSection" class="tab-content hidden">
            <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;">Linguistica</h2>
            <div id="linguisticsContent"></div>
        </section>

        <!-- Grammar Section -->
        <section id="grammarSection" class="tab-content hidden">
            <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;">Grammatica</h2>
            <div id="grammarContent"></div>
        </section>

        <!-- Dialogs Section -->
        <section id="dialogsSection" class="tab-content hidden">
            <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;">Dialoghi</h2>
            <div class="level-filter" id="levelFilter"></div>
            <button class="practice-mode-btn">Practice Mode</button>
            <div id="dialogsContent"></div>
        </section>

        <!-- Resources Section -->
        <section id="resourcesSection" class="tab-content hidden">
            <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;">Risorse</h2>
            <div id="resourcesContent"></div>
        </section>

        <!-- Journal Section -->
        <section id="journalSection" class="tab-content hidden">
            <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;">Giornale</h2>
            <div class="journal-layout">
                <div class="journal-writing">
                    <textarea class="journal-textarea" id="journalEntry" placeholder="Start writing..."></textarea>
                    <div class="journal-controls">
                        <span class="word-count">Words: <span id="wordCount">0</span></span>
                        <button class="journal-save-btn">Save Entry</button>
                    </div>
                </div>
                <div class="journal-sidebar">
                    <div class="journal-prompt">
                        <div class="journal-prompt-title" id="promptTitle">Today's Prompt</div>
                        <div class="journal-prompt-text" id="promptText"></div>
                    </div>
                    <button class="random-prompt-btn">Random Prompt</button>
                    <div class="category-filter-journal" id="categoryFilter"></div>
                    <div class="past-entries">
                        <div class="past-entries-title">Past Entries</div>
                        <div id="pastEntriesList"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Global state
        const state = {
            name: '',
            currentLanguage: 'italian',
            currentLang: 'italian',
            languages: {
                italian: {
                    selected: false,
                    level: 'C1-C2',
                    learningStyles: [],
                    goals: [],
                    resources: [],
                    progress: {},
                    journalEntries: []
                },
                french: {
                    selected: false,
                    level: 'A1-A2',
                    learningStyles: [],
                    goals: [],
                    resources: [],
                    progress: {},
                    journalEntries: []
                },
                catalan: {
                    selected: false,
                    level: 'A1-A2',
                    learningStyles: [],
                    goals: [],
                    resources: [],
                    progress: {},
                    journalEntries: []
                }
            },
            streak: 0,
            lastVisit: null,
            quizComplete: false,
            showAllLevels: false
        };

        const translations = {
            italian: {
                dashboard: 'Dashboard',
                linguistics: 'Linguistica',
                grammar: 'Grammatica',
                dialogs: 'Dialoghi',
                resources: 'Risorse',
                journal: 'Giornale',
                welcome: 'Ciao',
                level: 'Livello',
                goals: 'Obiettivi'
            },
            french: {
                dashboard: 'Dashboard',
                linguistics: 'Linguistique',
                grammar: 'Grammaire',
                dialogs: 'Dialogues',
                resources: 'Ressources',
                journal: 'Journal',
                welcome: 'Bonjour',
                level: 'Niveau',
                goals: 'Objectifs'
            },
            catalan: {
                dashboard: 'Dashboard',
                linguistics: 'Lingüística',
                grammar: 'Gramàtica',
                dialogs: 'Diàlegs',
                resources: 'Recursos',
                journal: 'Diari',
                welcome: 'Hola',
                level: 'Nivell',
                goals: 'Objectius'
            }
        };

        // Quiz steps
        const quizSteps = [
            {
                title: "What's your name?",
                type: 'input',
                key: 'name'
            },
            {
                title: 'Which language are you learning?',
                type: 'language-select',
                options: [
                    { label: 'Italian', emoji: '🇮🇹', value: 'italian' },
                    { label: 'French', emoji: '🇫🇷', value: 'french' },
                    { label: 'Catalan', emoji: '🇪🇸', value: 'catalan' },
                    { label: 'Spanish', emoji: '🇪🇸', value: 'spanish', disabled: true },
                    { label: 'Portuguese', emoji: '🇵🇹', value: 'portuguese', disabled: true },
                    { label: 'German', emoji: '🇩🇪', value: 'german', disabled: true }
                ]
            },
            {
                title: "What's your current level?",
                type: 'language-level',
                options: [
                    { label: 'A1–A2 Beginner', value: 'A1-A2' },
                    { label: 'B1–B2 Intermediate', value: 'B1-B2' },
                    { label: 'C1–C2 Advanced', value: 'C1-C2' },
                    { label: 'Native / Polish', value: 'Native' }
                ]
            },
            {
                title: "What's your preferred learning style?",
                type: 'multi-select',
                options: [
                    { emoji: '👂', label: 'Listening', value: 'listening' },
                    { emoji: '📖', label: 'Reading', value: 'reading' },
                    { emoji: '✍️', label: 'Writing', value: 'writing' },
                    { emoji: '💬', label: 'Conversation', value: 'conversation' },
                    { emoji: '🔤', label: 'Grammar', value: 'grammar' },
                    { emoji: '🌊', label: 'Immersion', value: 'immersion' }
                ]
            },
            {
                title: 'What are your goals?',
                type: 'multi-select',
                options: [
                    { label: 'Sound Native', value: 'sound-native' },
                    { label: 'Travel', value: 'travel' },
                    { label: 'Academic', value: 'academic' },
                    { label: 'Professional', value: 'professional' },
                    { label: 'Connect', value: 'connect' },
                    { label: 'Literature', value: 'literature' }
                ]
            },
            {
                title: 'What resources have helped you?',
                type: 'multi-select',
                options: [
                    { label: 'YouTube', value: 'youtube' },
                    { label: 'Books', value: 'books' },
                    { label: 'Apps', value: 'apps' },
                    { label: 'Websites', value: 'websites' },
                    { label: 'Podcasts', value: 'podcasts' },
                    { label: 'Tutors', value: 'tutors' },
                    { label: 'TV & Film', value: 'tv-film' },
                    { label: 'Music', value: 'music' }
                ]
            }
        ];

        let currentQuizStep = 0;
        let quizAnswers = {};

        function renderQuizStep() {
            const step = quizSteps[currentQuizStep];
            const progressPercent = ((currentQuizStep + 1) / quizSteps.length) * 100;

            let html = `<div class="quiz-progress" id="quizProgress" style="width: ${progressPercent}%"></div>
                        <div class="quiz-title">${step.title}</div>`;

            if (step.type === 'input') {
                html += `<input type="text" class="quiz-input" id="quizInput" placeholder="Enter your name">`;
            } else if (step.type === 'language-select') {
                html += `<div class="language-tiles">`;
                step.options.forEach(opt => {
                    const selected = quizAnswers.language === opt.value ? ' selected' : '';
                    const disabled = opt.disabled ? ' disabled' : '';
                    html += `<div class="tile${selected}${disabled}" onclick="selectLanguage('${opt.value}')">
                                <div class="tile-emoji">${opt.emoji}</div>
                                <div>${opt.label}</div>
                            </div>`;
                });
                html += `</div>`;
            } else if (step.type === 'language-level') {
                html += `<div class="language-tiles">`;
                step.options.forEach(opt => {
                    const selected = quizAnswers.level === opt.value ? ' selected' : '';
                    html += `<div class="tile${selected}" style="grid-column: 1;" onclick="selectLevel('${opt.value}')">${opt.label}</div>`;
                });
                html += `</div>`;
            } else if (step.type === 'multi-select') {
                html += `<div class="quiz-multi-select">`;
                step.options.forEach(opt => {
                    const checked = (quizAnswers[step.title] || []).includes(opt.value) ? ' checked' : '';
                    html += `<label class="checkbox-tile">
                                <input type="checkbox" value="${opt.value}" ${checked} onchange="toggleMultiSelect('${step.title}', '${opt.value}')">
                                ${opt.emoji ? opt.emoji + ' ' : ''}${opt.label}
                            </label>`;
                });
                html += `</div>`;
            }

            html += `<div class="quiz-buttons">
                        ${currentQuizStep > 0 ? `<button class="btn" onclick="previousQuizStep()">Back</button>` : ''}
                        <button class="btn btn-primary" onclick="nextQuizStep()">
                            ${currentQuizStep === quizSteps.length - 1 ? 'Start Learning' : 'Next'}
                        </button>
                    </div>`;

            document.getElementById('quizContent').innerHTML = html;

            if (step.type === 'input') {
                document.getElementById('quizInput').focus();
            }
        }

        function nextQuizStep() {
            const step = quizSteps[currentQuizStep];

            if (step.type === 'input') {
                const value = document.getElementById('quizInput').value.trim();
                if (!value) {
                    alert('Please enter your name');
                    return;
                }
                quizAnswers.name = value;
                state.name = value;
            } else if (step.type === 'language-select') {
                if (!quizAnswers.language) {
                    alert('Please select a language');
                    return;
                }
            } else if (step.type === 'language-level') {
                if (!quizAnswers.level) {
                    alert('Please select a level');
                    return;
                }
                state.languages[quizAnswers.language].level = quizAnswers.level;
            }

            if (currentQuizStep < quizSteps.length - 1) {
                currentQuizStep++;
                renderQuizStep();
            } else {
                completeQuiz();
            }
        }

        function previousQuizStep() {
            if (currentQuizStep > 0) {
                currentQuizStep--;
                renderQuizStep();
            }
        }

        function selectLanguage(lang) {
            quizAnswers.language = lang;
            state.currentLanguage = lang;
            state.currentLang = lang;
            state.languages[lang].selected = true;
            renderQuizStep();
        }

        function selectLevel(level) {
            quizAnswers.level = level;
            renderQuizStep();
        }

        function toggleMultiSelect(category, value) {
            if (!quizAnswers[category]) {
                quizAnswers[category] = [];
            }
            const idx = quizAnswers[category].indexOf(value);
            if (idx > -1) {
                quizAnswers[category].splice(idx, 1);
            } else {
                quizAnswers[category].push(value);
            }
        }

        function completeQuiz() {
            state.quizComplete = true;
            state.languages[state.currentLanguage].learningStyles = quizAnswers["What\'s your preferred learning style?"] || [];
            state.languages[state.currentLanguage].goals = quizAnswers["What are your goals?"] || [];
            state.languages[state.currentLanguage].resources = quizAnswers["What resources have helped you?"] || [];

            document.getElementById('quizOverlay').classList.add('hidden');
            document.getElementById('navigation').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');

            state.lastVisit = new Date();
            state.streak = 1;

            initializeDashboard();
            setupEventListeners();
        }

        function toggleAllLevels() {
            state.showAllLevels = !state.showAllLevels;
            const note = document.getElementById('levelNote');
            if (state.showAllLevels) {
                note.textContent = 'Showing all levels';
            } else {
                note.innerHTML = '<strong>Showing content for C1-C2 level</strong> — <span class="show-all-levels-toggle" onclick="toggleAllLevels()">show all</span>';
            }
            renderLinguisticsContent();
            renderGrammarContent();
        }

        function initializeDashboard() {
            const name = state.name.split(' ')[0];
            document.getElementById('welcomeText').textContent = `${translations[state.currentLanguage].welcome}, ${name}`;
            document.getElementById('levelBadge').textContent = state.languages[state.currentLanguage].level;

            const goalChips = state.languages[state.currentLanguage].goals.map(g => `<div class="badge">${g}</div>`).join('');
            document.getElementById('goalChips').innerHTML = goalChips;

            renderDashboardGrid();
            renderLinguisticsContent();
            renderGrammarContent();
            renderDialogsContent();
            renderResourcesContent();
            renderJournalContent();
        }

        function renderDashboardGrid() {
            const sections = [
                { id: 1, title: 'LINGUISTICA', target: 'linguistics', num: '1' },
                { id: 2, title: 'GRAMMATICA', target: 'grammar', num: '2' },
                { id: 3, title: 'DIALOGHI', target: 'dialogs', num: '3' },
                { id: 4, title: 'RISORSE', target: 'resources', num: '4' },
                { id: 5, title: 'GIORNALE', target: 'journal', num: '5' },
                { id: 6, title: 'PROGRESS', target: 'dashboard', num: '6' }
            ];

            const grid = sections.map(s => `
                <div class="tile-card" onclick="switchTab('${s.target}')">
                    <div class="tile-card-number">${s.num}</div>
                    <div class="tile-card-title">${s.title}</div>
                    <div class="tile-card-progress">0/0 done</div>
                </div>
            `).join('');

            document.getElementById('dashboardGrid').innerHTML = grid;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName + 'Section').classList.remove('hidden');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        }

        function setupEventListeners() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    switchTab(e.target.dataset.tab);
                });
            });

            document.getElementById('languageBadge').addEventListener('click', toggleLanguageSelector);
        }

        function toggleLanguageSelector() {
            // Simplified for this version
            alert('Language switching feature - implement dropdown with Italian/French/Catalan');
        }

        // Placeholder functions for content rendering
        function renderLinguisticsContent() {
            const content = getItalianLinguisticsContent();
            document.getElementById('linguisticsContent').innerHTML = content;
            setupExpandableRows();
        }

        function renderGrammarContent() {
            const content = getItalianGrammarContent();
            document.getElementById('grammarContent').innerHTML = content;
            setupExpandableRows();
        }

        function renderDialogsContent() {
            const content = getDialogsContent();
            document.getElementById('dialogsContent').innerHTML = content;
            setupDialogListeners();
        }

        function renderResourcesContent() {
            const content = getResourcesContent();
            document.getElementById('resourcesContent').innerHTML = content;
        }

        function renderJournalContent() {
            const prompts = getJournalPrompts();
            const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
            document.getElementById('promptText').textContent = randomPrompt.text;

            document.getElementById('journalEntry').addEventListener('input', (e) => {
                const words = e.target.value.trim().split(/\s+/).filter(w => w).length;
                document.getElementById('wordCount').textContent = words;
            });
        }

        function setupExpandableRows() {
            document.querySelectorAll('.expandable-row').forEach(row => {
                row.addEventListener('click', function() {
                    const content = this.nextElementSibling;
                    if (content && content.classList.contains('expandable-content')) {
                        content.classList.toggle('open');
                        this.querySelector('.arrow').classList.toggle('open');
                    }
                });
            });
        }

        function setupDialogListeners() {
            document.querySelectorAll('.dialog-scenario').forEach(scenario => {
                scenario.addEventListener('click', function() {
                    const content = this.querySelector('.dialog-content');
                    content.classList.toggle('open');
                });
            });
        }

        // Content generation functions
        function getItalianLinguisticsContent() {
            const lang = state.currentLang;
            const topics = {
              italian: [
                { id:'vowels', title:'Il Sistema Vocalico', tag:'Phonology', level:'B1', content:`
<p><strong>Italian has 7 vowel phonemes</strong> in standard speech: /a/, /ɛ/ (open e), /e/ (closed e), /i/, /ɔ/ (open o), /o/ (closed o), /u/. Unlike English, they are <em>pure</em> — no diphthongs.</p>
<div class="ipa-example">casa [ˈkaːsa] — house &nbsp;|&nbsp; vero [ˈvɛːro] — true &nbsp;|&nbsp; verde [ˈverde] — green<br>sole [ˈsoːle] — sun &nbsp;|&nbsp; dolce [ˈdoltʃe] — sweet &nbsp;|&nbsp; blu [blu] — blue</div>
<p>English speakers diphthongize: "day" [deɪ] sounds wrong for Italian /e/. Hold the vowel still and release cleanly. Romans tend toward more open /ɛ/ and /ɔ/; northern Italians are closer. The open/closed distinction is lexically determined — there are no general rules, you learn by ear.</p>
<div class="vocab-note">⚡ Biggest American interference: saying [oʊ] for /o/ (like "no") and [eɪ] for /e/ (like "they"). Italian /o/ = pure round, /e/ = pure front. Drill: <em>bello, pelo, pena, bene, tono, solo, dove, nome</em>.</div>` },

                { id:'geminate', title:'Raddoppiamento Fonosintattico', tag:'Phonology', level:'C1', content:`
<p><strong>Geminate (double) consonants are phonemically contrastive.</strong> The double consonant is held ~2× longer; the preceding vowel is shortened and more tense. This is the single most recognizable marker of a foreign accent.</p>
<div class="ipa-example">nono [ˈnɔːno] ninth ≠ nonno [ˈnɔnno] grandfather<br>pala [ˈpaːla] shovel ≠ palla [ˈpalla] ball<br>caro [ˈkaːro] dear ≠ carro [ˈkarro] cart<br>tono [ˈtoːno] tone ≠ tonno [ˈtɔnno] tuna<br>note [ˈnoːte] notes ≠ notte [ˈnɔtte] night</div>
<p><strong>Raddoppiamento sintattico</strong> — syntactic doubling across word boundaries. Monosyllables ending in a stressed vowel trigger phonetic doubling of the following consonant.</p>
<div class="ipa-example">Triggers: è, che, qui, lì, su, giù, già, più, tre, ho, ha, do, fa, so, sta, va, a (prep)<br><br>è bello → [ɛbˈbɛllo] &nbsp;|&nbsp; a casa → [akˈkaːsa] &nbsp;|&nbsp; tre cani → [trɛkˈkaːni]<br>più tardi → [pjuʦˈtardi] &nbsp;|&nbsp; chi sa → [kiˈssa] &nbsp;|&nbsp; ho fatto → [ɔfˈfatto]</div>
<div class="vocab-note">⚡ This is why native speakers run words together in ways that seem unpredictable. Once you internalize the trigger list, you'll hear it everywhere.</div>` },

                { id:'assimilation', title:'Assimilazione e Discorso Connesso', tag:'Phonology', level:'C1', content:`
<p><strong>Place assimilation:</strong> /n/ assimilates to the place of articulation of the following consonant in fast, natural speech.</p>
<div class="ipa-example">Before labials (/p/, /b/, /m/): /n/ → [m]<br>in bocca → [imˈbɔkka] &nbsp;|&nbsp; un po' → [umˈpɔ] &nbsp;|&nbsp; in piazza → [imˈpjattsa] &nbsp;|&nbsp; in mente → [imˈmɛnte]<br><br>Before velars (/k/, /g/): /n/ → [ŋ]<br>un cane → [uŋˈkaːne] &nbsp;|&nbsp; un gatto → [uŋˈgatto] &nbsp;|&nbsp; in gamba → [iŋˈgamba]</div>
<p><strong>Elision:</strong> vowel deleted before vowel-initial word. <em>l'amico, dell'uva, quell'uomo, un'ora</em>. Also informal: <em>m'hai detto, t'ho chiamato, s'è rotto</em>.</p>
<p><strong>Troncamento (apocope):</strong> final vowel/syllable drops after l, r, n, m before a consonant. <em>buon giorno, gran bel posto, San Pietro, bel ragazzo, suor Maria</em>.</p>
<div class="vocab-note">⚡ These aren't lazy speech — they're obligatory phonological rules in natural Italian. Applying them makes you sound native; ignoring them sounds formal or foreign.</div>` },

                { id:'rhythm', title:'Ritmo e Intonazione', tag:'Phonology', level:'B1', content:`
<p><strong>Italian is syllable-timed:</strong> all syllables get roughly equal duration. English is stress-timed (unstressed syllables are compressed). This creates Italian's "musical" quality — the even pulse you hear.</p>
<p><strong>Intonation patterns:</strong></p>
<div class="ipa-example">Statements: falling contour at end — "Ho mangiato la pizza" ↘<br>Yes/No questions: gentle rise on the final word only — "Hai mangiato?" ↗<br>Lists: mid-rise on each item, fall on last — "pane↗, pasta↗, vino↘"<br>Contrast emphasis: "L'HO fatto IO" — stressed items get full vowels, pitch boost</div>
<p>Unlike English, Italian doesn't reduce unstressed vowels to schwa. Every syllable stays clear. Say "politica" with four equal syllables: po-LI-ti-ca.</p>
<div class="vocab-note">⚡ Geopop videos are excellent for intonation modeling — educated Roman Italian at natural pace. SKAM Italia for youth/colloquial register.</div>` },

                { id:'verb-morphology', title:'Morfologia Verbale', tag:'Morphology', level:'A2', content:`
<p><strong>Three conjugation classes:</strong> -ARE (mangiare), -ERE (leggere), -IRE (partire). Endings encode person + number + tense + mood. Italian is <strong>pro-drop</strong> — subject pronouns usually omitted because the ending disambiguates.</p>
<div class="ipa-example">mangio = I eat &nbsp;|&nbsp; mangi = you eat &nbsp;|&nbsp; mangia = he/she eats<br>mangiamo = we eat &nbsp;|&nbsp; mangiate = you (pl) eat &nbsp;|&nbsp; mangiano = they eat</div>
<p><strong>Past participle formation:</strong> -ARE → -ato (parlato), -ERE → -uto (venduto), -IRE → -ito (partito).<br>Key irregulars: fatto, detto, scritto, letto, visto, aperto, messo, preso, venuto, stato, potuto, dovuto, voluto, chiesto, risposto, rimasto, nato, morto, offerto.</p>
<p><strong>Key irregular stems:</strong> essere (sono/sei/è/siamo/siete/sono), avere (ho/hai/ha/abbiamo/avete/hanno), andare (vado/vai/va/andiamo/andate/vanno), fare (faccio/fai/fa/facciamo/fate/fanno), dire (dico/dici/dice/diciamo/dite/dicono), venire (vengo/vieni/viene/veniamo/venite/vengono), uscire (esco/esci/esce/usciamo/uscite/escono).</p>` },

                { id:'noun-morphology', title:'Morfologia Nominale e Genere', tag:'Morphology', level:'A2', content:`
<p><strong>Gender assignment:</strong> -o = usually masculine, -a = usually feminine, -e = either. Exceptions are common: <em>il problema, il tema, il clima, il poeta</em> (masc. in -a); <em>la radio, la mano, la foto, la moto</em> (fem. in -o).</p>
<div class="ipa-example">Plural: -o → -i (libro/libri), -a → -e (porta/porte), -e → -i (stazione/stazioni, cane/cani)<br>Irregular: l'uomo → gli uomini, la mano → le mani, il bue → i buoi, l'uovo → le uova</div>
<p><strong>Suffixes:</strong> -ino/ina (small/cute: cagnino, casina), -one/ona (big: macchinone, stanzone), -etto/etta (diminutive nice: casetta, ragazzetto), -accio/accia (pejorative: tempaccio, parolaccia).</p>
<p><strong>Invariable nouns:</strong> nouns ending in accented vowel (città, caffè, università), foreign loanwords (lo sport, il film, la chat), nouns ending in consonant (il bar, il tram).</p>` },

                { id:'syntax', title:'La Sintassi Italiana', tag:'Syntax', level:'B2', content:`
<p><strong>Default word order is SVO</strong> — but flexibility is much greater than English thanks to morphological marking. Information structure drives word order, not grammar.</p>
<p><strong>Topicalization (left dislocation):</strong> move a constituent to the front with a resumptive clitic.<br><em>Il libro, l'ho già letto.</em> (The book, I've already read it.)<br><em>A Marco, gli ho parlato ieri.</em> (Marco, I spoke to him yesterday.)</p>
<p><strong>Clitic placement:</strong> preverbal with finite verbs (Lo vedo), postverbal/attached with infinitives (Voglio vederlo), imperative (Guardalo!), gerund (Vedendolo). <strong>Clitic climbing:</strong> Lo voglio vedere (clitic climbs from embedded infinitive to modal).</p>
<div class="ipa-example">NE — replaces di+NP or partitive quantity: "Quanti ne vuoi?" "Ne voglio tre." Also origin: "Vengo da Roma" → "Ne vengo."<br>CI — replaces a+NP (location/direction): "Vai a Roma?" "Sì, ci vado." Also idiomatic: "Ci vuole pazienza." "Ci tengo."</div>` },

                { id:'congiuntivo', title:'Il Congiuntivo — Quando e Perché', tag:'Syntax', level:'C1', content:`
<p><strong>The Italian subjunctive is alive</strong> in educated speech and writing. It is NOT dying despite what some say. Key triggers:</p>
<div class="ipa-example">Volitional: voglio che tu venga, preferisco che stia a casa, è necessario che parta<br>Epistemic (doubt/belief): penso che sia vero, dubito che venga, non so se abbia capito<br>Impersonal: è importante che tu sappia, bisogna che parliamo, sembra che piova<br>Concessive: benché sia stanco, sebbene non capisca, nonostante faccia freddo, per quanto cerchi<br>Temporal (future ref.): prima che tu vada, finché non arrivi, nel caso in cui venga<br>Purpose: affinché capiscano, perché tu possa studiare meglio<br>Conditional: a meno che non piova, purché tu venga, a condizione che paghi<br>Free relatives: chiunque venga, qualunque cosa dica, dovunque vada</div>
<div class="vocab-note">⚡ After "come se" always use subjunctive: "Parla come se sapesse tutto." After "magari" = congiuntivo trapassato for remote wishes: "Magari fossi ricco!"</div>` }
              ],
              french: [
                { id:'fr-vowels', title:'Le Système Vocalique', tag:'Phonologie', level:'A2', content:`
<p><strong>French has 16 vowels</strong> including 4 nasal vowels. Front rounded vowels /y/, /ø/, /œ/ don't exist in English — pronounce /i/ with rounded lips for /y/ (tu, lune, vu).</p>
<div class="ipa-example">Nasal vowels: /ɛ̃/ fin, /ɑ̃/ blanc, /ɔ̃/ bon, /œ̃/ brun (merging with /ɛ̃/ in many speakers)<br>The schwa /ə/ is unstable — dropped in casual speech: "je ne sais pas" → "j'sais pas"<br>Key pairs: dessus/dessous [dəsy/dəsu] above/below &nbsp;|&nbsp; beau/bol [bo/bɔl]</div>
<div class="vocab-note">⚡ For /y/ (tu): say [i] then round your lips without moving your tongue. For /ø/ (feu): say [e] then round lips. These are the two most characteristic French sounds.</div>` },
                { id:'fr-liaison', title:'La Liaison et l\'Élision', tag:'Phonologie', level:'A2', content:`
<p><strong>Liaison:</strong> normally silent final consonant is pronounced before a vowel-initial word. Three types: obligatory, forbidden, optional.</p>
<div class="ipa-example">Obligatory: les enfants [lezɑ̃fɑ̃], nous avons [nuzavɔ̃], ils ont [ilzɔ̃], très utile [trɛzytil]<br>Forbidden: after "et" (et / il, never linked), after singular noun (un chat / énorme), after "comment" in questions<br>Liaison consonants: s/x → [z], d → [t], f → [v] (neuf ans → [nœvɑ̃])</div>
<p><strong>Élision:</strong> le→l', la→l', je→j', me→m', se→s', de→d', que→qu', ce→c' before vowels.<br><strong>Enchaînement:</strong> final pronounced consonant links to next vowel. "avec elle" → [avɛkɛl].</p>` },
                { id:'fr-rhythm', title:'Rythme et Accent', tag:'Phonologie', level:'B1', content:`
<p><strong>French stress is fixed on the LAST syllable of a rhythm group</strong> (not the word). "Je parle français" → stress on -ÇAIS. Rhythm groups are sense-units.</p>
<p>No pitch accent, no tones. French is syllable-timed. Consonants belong to the FOLLOWING syllable: "une amie" → /y.na.mi/.</p>
<div class="ipa-example">Yes/no questions: rise on last syllable, or inversion (formel), or est-ce que (neutre)<br>"T'as mangé?" (intonation) = "Est-ce que tu as mangé?" = "As-tu mangé?" (formel)</div>` }
              ],
              catalan: [
                { id:'ca-vowels', title:'El Sistema Vocàlic', tag:'Fonologia', level:'A2', content:`
<p><strong>Eastern Catalan vowel reduction:</strong> unstressed /a/ and /e/ → schwa [ə]; unstressed /o/ and /u/ → [u]. "casa" → [ˈkazə], "porto" → [ˈpurtu]. Western Catalan (Valencia, Lleida) does NOT reduce — more open and clear.</p>
<div class="ipa-example">7 stressed vowels: /a, ɛ, e, i, ɔ, o, u/ — similar to Italian<br>Schwa [ə] appears ONLY in unstressed position in Eastern dialects<br>patata [pəˈtatə] &nbsp;|&nbsp; pedra [ˈpɛðɾə] &nbsp;|&nbsp; porta [ˈpɔɾtə]</div>` },
                { id:'ca-consonants', title:'Fenòmens Consonàntics', tag:'Fonologia', level:'B1', content:`
<p><strong>Final obstruent devoicing:</strong> final /b,d,g,v,z/ → [p,t,k,f,s]. "Fred" (cold) → [frɛt], "llarg" (long) → [ʎark].</p>
<div class="ipa-example">L·L (ela geminada): long /ll/ geminate — col·legi [kɔlˈleʒi], il·lusió [illuziˈo]<br>NY = /ɲ/ (like Italian GN): any [ˈaɲ] year, Catalunya [kətəˈluɲə]<br>TX/TG = /tʃ/: metge [ˈmedʒə] doctor, cotxe [ˈkɔtʃə] car<br>V and B: merged — both [b]/[β] in most dialects</div>` }
              ]
            };
            const langTopics = topics[lang] || topics.italian;
            return langTopics.map(t => `
                <div class="expandable-row" data-level="${t.level}" onclick="toggleExpand(this)">
                    <div class="expandable-row-header">
                        <span class="expandable-row-title">${t.title}</span>
                        <div class="expandable-row-meta">
                            <span class="progress-dot" id="dot-${t.id}"></span>
                            <span class="tag">${t.tag}</span>
                            <span style="font-size:11px;color:var(--text-light)">${t.level}</span>
                            <span class="arrow">→</span>
                        </div>
                    </div>
                    <div class="expandable-content">${t.content}</div>
                </div>`).join('');
        }

        
        function getItalianGrammarContent() {
            const lang = state.currentLang;
            const topics = {
              italian: [
                { id:'articles', title:'GLI ARTICOLI', tag:'A1', level:'A1', content:`
<p><strong>Definite articles ("the"):</strong></p>
<table class="conj-table"><tr><th></th><th>M Sg</th><th>F Sg</th><th>M Pl</th><th>F Pl</th></tr>
<tr><td>Before consonant</td><td>il</td><td>la</td><td>i</td><td>le</td></tr>
<tr><td>Before vowel</td><td>l'</td><td>l'</td><td>gli</td><td>le</td></tr>
<tr><td>Before s+cons, z, gn, ps, x, y</td><td>lo</td><td>la</td><td>gli</td><td>le</td></tr></table>
<p style="margin-top:12px"><strong>Indefinite articles ("a/an"):</strong> un (m, before consonant or vowel), uno (m, before s+cons/z/gn/ps/x/y), una (f, before consonant), un' (f, before vowel).</p>
<p><strong>Partitive articles ("some/any"):</strong> del/dello/dell'/della/dei/degli/delle — combine di + definite article.</p>
<div class="ipa-example">il libro, lo studente, l'amico, la casa, i libri, gli studenti, le case<br>un libro, uno studente, un'amica, una casa<br>del pane, dello zucchero, dell'acqua, della pasta, dei biscotti</div>
<div class="exercise-block">
  <div class="ex-q">___ studente arriva domani.</div>
  <input class="ex-input" placeholder="article"> <button class="ex-btn" onclick="chk(this,'Lo')">✓</button>
  <div class="ex-q">Ho comprato ___ uova al mercato.</div>
  <input class="ex-input" placeholder="article"> <button class="ex-btn" onclick="chk(this,'delle')">✓</button>
  <div class="ex-q">Parla con ___ amiche di Marco.</div>
  <input class="ex-input" placeholder="article"> <button class="ex-btn" onclick="chk(this,'le')">✓</button>
</div>` },

                { id:'pres', title:'PRESENTE INDICATIVO', tag:'A1', level:'A1', content:`
<table class="conj-table"><tr><th></th><th>-ARE parlare</th><th>-ERE leggere</th><th>-IRE partire</th><th>-IRE (isc) capire</th></tr>
<tr><td>io</td><td>parlo</td><td>leggo</td><td>parto</td><td>capisco</td></tr>
<tr><td>tu</td><td>parli</td><td>leggi</td><td>parti</td><td>capisci</td></tr>
<tr><td>lui/lei</td><td>parla</td><td>legge</td><td>parte</td><td>capisce</td></tr>
<tr><td>noi</td><td>parliamo</td><td>leggiamo</td><td>partiamo</td><td>capiamo</td></tr>
<tr><td>voi</td><td>parlate</td><td>leggete</td><td>partite</td><td>capite</td></tr>
<tr><td>loro</td><td>parlano</td><td>leggono</td><td>partono</td><td>capiscono</td></tr></table>
<p style="margin-top:12px"><strong>Key irregulars:</strong> essere (sono/sei/è/siamo/siete/sono), avere (ho/hai/ha/abbiamo/avete/hanno), andare (vado/vai/va/andiamo/andate/vanno), fare (faccio/fai/fa/facciamo/fate/fanno), dire (dico/dici/dice/diciamo/dite/dicono), venire (vengo/vieni/viene/veniamo/venite/vengono), uscire (esco/esci/esce/usciamo/uscite/escono), sapere (so/sai/sa/sappiamo/sapete/sanno).</p>
<div class="exercise-block">
  <div class="ex-q">Non (loro — capire) ___ l'italiano.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'capiscono')">✓</button>
  <div class="ex-q">(Io — sapere) ___ dov'è, ma non te lo dico.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'so')">✓</button>
</div>` },

                { id:'pp', title:'PASSATO PROSSIMO', tag:'A2', level:'A2', content:`
<p><strong>Formation:</strong> auxiliary (avere or essere) in presente + past participle.</p>
<p><strong>ESSERE auxiliary</strong> = intransitive verbs of motion/change of state + reflexives. Past participle <em>agrees</em> with subject in gender/number.</p>
<div class="ipa-example">Verbs taking essere: andare, venire, partire, arrivare, uscire, entrare, tornare, restare, rimanere, cadere, nascere, morire, diventare, essere, stare, sembrare, succedere, piacere, and ALL reflexives.</div>
<p><strong>AVERE auxiliary</strong> = all transitive verbs + many intransitive. Past participle is invariable (unless direct object pronoun precedes).</p>
<div class="ipa-example">Ho mangiato la pizza. &nbsp;|&nbsp; Sono andato a Roma. &nbsp;|&nbsp; Si è svegliata tardi.<br>La pizza che ho mangiato era buonissima. (no agreement needed)<br>La pizza? L'ho mangiata ieri. (pronoun precedes → agreement)</div>
<div class="exercise-block">
  <div class="ex-q">Ieri sera (noi — mangiare) ___ la pizza insieme.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'abbiamo mangiato')">✓</button>
  <div class="ex-q">Mia madre (partire) ___ stamattina per Roma.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'è partita')">✓</button>
</div>` },

                { id:'imp', title:'IMPERFETTO', tag:'A2', level:'A2', content:`
<table class="conj-table"><tr><th></th><th>-ARE parlare</th><th>-ERE leggere</th><th>-IRE partire</th></tr>
<tr><td>io</td><td>parlavo</td><td>leggevo</td><td>partivo</td></tr>
<tr><td>tu</td><td>parlavi</td><td>leggevi</td><td>partivi</td></tr>
<tr><td>lui/lei</td><td>parlava</td><td>leggeva</td><td>partiva</td></tr>
<tr><td>noi</td><td>parlavamo</td><td>leggevamo</td><td>partivamo</td></tr>
<tr><td>voi</td><td>parlavate</td><td>leggevate</td><td>partivate</td></tr>
<tr><td>loro</td><td>parlavano</td><td>leggevano</td><td>partivano</td></tr></table>
<p style="margin-top:12px"><strong>Uses:</strong> habitual/repeated past action (ero sempre in ritardo), background descriptions, ongoing action interrupted by passato prossimo, mental/physical states in the past.</p>
<p><strong>Irregulars:</strong> essere (ero/eri/era/eravamo/eravate/erano), fare (facevo...), dire (dicevo...), bere (bevevo...), tradurre (traducevo...).</p>
<div class="exercise-block">
  <div class="ex-q">Quando ero piccolo, (giocare) ___ sempre a calcio.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'giocavo')">✓</button>
  <div class="ex-q">Mentre (io — studiare) ___, lui guardava la TV.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'studiavo')">✓</button>
</div>` },

                { id:'fut', title:'FUTURO SEMPLICE', tag:'B1', level:'B1', content:`
<p>All verbs use the same endings: -ò/-ai/-à/-emo/-ete/-anno. Stem = infinitive minus final -e (for -ARE: also -a→-e in stem).</p>
<div class="ipa-example">parlare → parlerò, parlerai, parlerà, parleremo, parlerete, parleranno<br>leggere → leggerò, leggerai...<br>partire → partirò, partirai...</div>
<p><strong>Irregular stems:</strong> andare→andr-, avere→avr-, dovere→dovr-, potere→potr-, venire→verr-, volere→vorr-, tenere→terr-, rimanere→rimarr-, bere→berr-, essere→sar-, fare→far-, dare→dar-, stare→star-, dire→dir-.</p>
<p><strong>Uses:</strong> future events, BUT also epistemic use for probability/guessing: "Saranno le tre" (it must be about three), "Avrà trent'anni" (he must be about thirty), "Dove sarà finito?" (where could he have gotten to?).</p>
<div class="exercise-block">
  <div class="ex-q">Non so dove sia — (essere) ___ in ufficio.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'sarà')">✓</button>
  <div class="ex-q">Se ho tempo, (venire) ___ alla festa.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'verrò')">✓</button>
</div>` },

                { id:'cond', title:'CONDIZIONALE PRESENTE', tag:'B1', level:'B1', content:`
<p>Same irregular stems as futuro + endings: -ei/-esti/-ebbe/-emmo/-este/-ebbero.</p>
<div class="ipa-example">vorrei, vorresti, vorrebbe, vorremmo, vorreste, vorrebbero<br>sarei, saresti, sarebbe, saremmo, sareste, sarebbero</div>
<p><strong>Uses:</strong> polite requests (Vorrei un caffè, Potrebbe aiutarmi?), hypothetical present/future (Lo farei volentieri), reported future from past (Disse che sarebbe venuto), suggestions (Dovresti riposare).</p>
<div class="exercise-block">
  <div class="ex-q">(Tu — volere) ___ un altro caffè?</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'Vorresti')">✓</button>
  <div class="ex-q">Con più tempo, (io — fare) ___ un viaggio in Giappone.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'farei')">✓</button>
</div>` },

                { id:'condpass', title:'CONDIZIONALE PASSATO', tag:'B2', level:'B2', content:`
<p><strong>Formation:</strong> essere/avere in condizionale + past participle.</p>
<div class="ipa-example">avrei parlato, saresti andato/a, avrebbe fatto, saremmo partiti/e, sareste rimasti/e, avrebbero detto</div>
<p><strong>Uses:</strong> unrealized past conditions (Sarei venuto, ma avevo la febbre), future-in-the-past (Sapevo che sarebbe arrivato tardi), reported speech (Ha detto che avrebbe chiamato).</p>
<div class="exercise-block">
  <div class="ex-q">Se avessi saputo, (venire) ___.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'sarei venuto')">✓</button>
</div>` },

                { id:'congiunt', title:'CONGIUNTIVO PRESENTE', tag:'C1', level:'C1', content:`
<table class="conj-table"><tr><th></th><th>-ARE parlare</th><th>-ERE leggere</th><th>-IRE capire</th><th>essere</th><th>avere</th></tr>
<tr><td>io/tu/lui</td><td>parli</td><td>legga</td><td>capisca</td><td>sia</td><td>abbia</td></tr>
<tr><td>noi</td><td>parliamo</td><td>leggiamo</td><td>capiamo</td><td>siamo</td><td>abbiamo</td></tr>
<tr><td>voi</td><td>parliate</td><td>leggiate</td><td>capiate</td><td>siate</td><td>abbiate</td></tr>
<tr><td>loro</td><td>parlino</td><td>leggano</td><td>capiscano</td><td>siano</td><td>abbiano</td></tr></table>
<p style="margin-top:12px"><strong>Key irregulars:</strong> fare→faccia, dare→dia, stare→stia, andare→vada, venire→venga, potere→possa, volere→voglia, sapere→sappia, dovere→debba, dire→dica, uscire→esca.</p>
<div class="exercise-block">
  <div class="ex-q">Penso che lui (avere) ___ ragione.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'abbia')">✓</button>
  <div class="ex-q">È importante che tu (sapere) ___ la verità.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'sappia')">✓</button>
</div>` },

                { id:'congimp', title:'CONGIUNTIVO IMPERFETTO', tag:'C1', level:'C1', content:`
<table class="conj-table"><tr><th></th><th>-ARE</th><th>-ERE</th><th>-IRE</th><th>essere</th></tr>
<tr><td>io/tu</td><td>parlassi</td><td>leggessi</td><td>partissi</td><td>fossi</td></tr>
<tr><td>lui/lei</td><td>parlasse</td><td>leggesse</td><td>partisse</td><td>fosse</td></tr>
<tr><td>noi</td><td>parlassimo</td><td>leggessimo</td><td>partissimo</td><td>fossimo</td></tr>
<tr><td>voi</td><td>parlaste</td><td>leggeste</td><td>partiste</td><td>foste</td></tr>
<tr><td>loro</td><td>parlassero</td><td>leggessero</td><td>partissero</td><td>fossero</td></tr></table>
<p style="margin-top:12px"><strong>Uses:</strong> Type 2 conditional (se + congiuntivo imperfetto → condizionale presente), after past-tense verbs with subjunctive triggers, after "come se".</p>
<div class="exercise-block">
  <div class="ex-q">Se (avere) ___ più soldi, viaggerei di più.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'avessi')">✓</button>
  <div class="ex-q">Parlava come se (sapere) ___ tutto.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'sapesse')">✓</button>
</div>` },

                { id:'imperativo', title:'IMPERATIVO', tag:'B1', level:'B1', content:`
<table class="conj-table"><tr><th></th><th>-ARE parlare</th><th>-ERE leggere</th><th>-IRE partire</th></tr>
<tr><td>tu</td><td>parla!</td><td>leggi!</td><td>parti!</td></tr>
<tr><td>Lei (formal)</td><td>parli!</td><td>legga!</td><td>parta!</td></tr>
<tr><td>noi</td><td>parliamo!</td><td>leggiamo!</td><td>partiamo!</td></tr>
<tr><td>voi</td><td>parlate!</td><td>leggete!</td><td>partite!</td></tr></table>
<p style="margin-top:12px"><strong>Irregular tu forms:</strong> va'/vai, fa'/fai, da'/dai, sta'/stai, di' (from andare, fare, dare, stare, dire).</p>
<p><strong>Negative tu:</strong> non + infinitive: "Non farlo!", "Non andare!", "Non dire niente!"</p>
<p><strong>Clitics attach to affirmative imperativo</strong> (except Lei): Parlami! Fallo! Diglielo! — with monosyllabic forms, consonant doubles: fa' → fallo, di' → dillo.</p>
<div class="exercise-block">
  <div class="ex-q">(Tu — aspettare) ___ un momento!</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'Aspetta')">✓</button>
  <div class="ex-q">(Lei — venire) ___ pure, si accomodi!</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'Venga')">✓</button>
</div>` },

                { id:'pronouns', title:'I PRONOMI', tag:'B1', level:'B1', content:`
<p><strong>Subject pronouns (pro-drop — usually omit):</strong> io, tu, lui/lei, noi, voi, loro. Use for emphasis/contrast: "L'ho fatto IO, non lui."</p>
<p><strong>Direct object:</strong> mi, ti, lo/la, ci, vi, li/le — preverbal with finite verbs, suffixed with infinitives.</p>
<p><strong>Indirect object:</strong> mi, ti, gli/le, ci, vi, gli (loro) — "Gli parlo" (I speak to him/her), "Le mando un messaggio."</p>
<p><strong>Combined pronouns:</strong></p>
<table class="conj-table"><tr><th></th><th>lo</th><th>la</th><th>li</th><th>le</th><th>ne</th></tr>
<tr><td>mi</td><td>me lo</td><td>me la</td><td>me li</td><td>me le</td><td>me ne</td></tr>
<tr><td>ti</td><td>te lo</td><td>te la</td><td>te li</td><td>te le</td><td>te ne</td></tr>
<tr><td>gli/le</td><td>glielo</td><td>gliela</td><td>glieli</td><td>gliele</td><td>gliene</td></tr>
<tr><td>ci</td><td>ce lo</td><td>ce la</td><td>ce li</td><td>ce le</td><td>ce ne</td></tr>
<tr><td>vi</td><td>ve lo</td><td>ve la</td><td>ve li</td><td>ve le</td><td>ve ne</td></tr></table>
<div class="exercise-block">
  <div class="ex-q">Ho visto Marco ieri → ___ ho visto ieri.</div>
  <input class="ex-input" placeholder="pronoun"> <button class="ex-btn" onclick="chk(this,'L\'')">✓</button>
  <div class="ex-q">Puoi darmi il libro? → Puoi ___?</div>
  <input class="ex-input" placeholder="darmelo etc"> <button class="ex-btn" onclick="chk(this,'darmelo')">✓</button>
</div>` },

                { id:'prep', title:'LE PREPOSIZIONI', tag:'B1', level:'B1', content:`
<p><strong>Articulated prepositions (di/a/da/in/su + article):</strong></p>
<table class="conj-table"><tr><th></th><th>il</th><th>lo</th><th>l'</th><th>la</th><th>i</th><th>gli</th><th>le</th></tr>
<tr><td>di</td><td>del</td><td>dello</td><td>dell'</td><td>della</td><td>dei</td><td>degli</td><td>delle</td></tr>
<tr><td>a</td><td>al</td><td>allo</td><td>all'</td><td>alla</td><td>ai</td><td>agli</td><td>alle</td></tr>
<tr><td>da</td><td>dal</td><td>dallo</td><td>dall'</td><td>dalla</td><td>dai</td><td>dagli</td><td>dalle</td></tr>
<tr><td>in</td><td>nel</td><td>nello</td><td>nell'</td><td>nella</td><td>nei</td><td>negli</td><td>nelle</td></tr>
<tr><td>su</td><td>sul</td><td>sullo</td><td>sull'</td><td>sulla</td><td>sui</td><td>sugli</td><td>sulle</td></tr></table>
<p style="margin-top:12px"><strong>Key uses — A:</strong> destination (Vado a Roma), time (alle otto, a Natale), manner (a piedi, a voce alta).<br><strong>DI:</strong> possession (la macchina di Marco), origin (sono di Roma), comparison (più bello di te).<br><strong>DA:</strong> origin-from (vengo da Roma), duration (da tre anni — ongoing!), at someone's place (dal medico, da Maria), passive agent (scritto da Calvino).<br><strong>IN:</strong> location with large places (in Italia, in ufficio, in camera), transport (in macchina, in aereo), time periods (in estate, in tre ore).</p>` },

                { id:'discorso', title:'DISCORSO INDIRETTO', tag:'B2', level:'B2', content:`
<p><strong>Converting direct → indirect speech:</strong></p>
<p>1. Pronoun shifts: 1st/2nd person → 3rd person (io→lui/lei, tu→lui/lei, noi→loro)</p>
<p>2. Time/place expressions shift:</p>
<div class="ipa-example">ieri → il giorno prima &nbsp;|&nbsp; oggi → quel giorno &nbsp;|&nbsp; domani → l'indomani / il giorno dopo<br>qui/qua → lì/là &nbsp;|&nbsp; questo → quello &nbsp;|&nbsp; ora → allora</div>
<p>3. Tense shifts with PAST reporting verb:</p>
<table class="conj-table"><tr><th>Direct</th><th>Indirect</th></tr>
<tr><td>presente</td><td>imperfetto (or presente)</td></tr>
<tr><td>passato prossimo</td><td>trapassato prossimo</td></tr>
<tr><td>futuro semplice</td><td>condizionale presente</td></tr>
<tr><td>imperativo</td><td>di + infinito</td></tr>
<tr><td>imperfetto</td><td>imperfetto (unchanged)</td></tr></table>
<p style="margin-top:12px">Reporting questions: YES/NO → se: "Viene?" → Ha chiesto se venivo.<br>Open questions → keep interrogative: "Dove vai?" → Ha chiesto dove andassi.</p>
<div class="exercise-block">
  <div class="ex-q">"Vengo domani." → Ha detto che ___ l'indomani.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'veniva')">✓</button>
</div>` },

                { id:'periodo', title:'PERIODO IPOTETICO', tag:'C1', level:'C1', content:`
<table class="conj-table"><tr><th>Type</th><th>SE clause</th><th>Result clause</th><th>Meaning</th></tr>
<tr><td>1 — Reale</td><td>se + presente</td><td>presente / futuro</td><td>real/likely: Se piove, resto a casa.</td></tr>
<tr><td>2 — Possibile</td><td>se + cong. imperfetto</td><td>condizionale presente</td><td>hypothetical: Se avessi una macchina, andrei al mare.</td></tr>
<tr><td>3 — Irreale</td><td>se + cong. trapassato</td><td>condizionale passato</td><td>counterfactual: Se fossi arrivato prima, l'avrei visto.</td></tr>
<tr><td>Misto</td><td>se + cong. trapassato</td><td>condizionale presente</td><td>Se fossi nato in Italia, parlerei italiano perfettamente.</td></tr></table>
<div class="exercise-block">
  <div class="ex-q">Se (potere) ___, verrei subito. (Type 2)</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'potessi')">✓</button>
  <div class="ex-q">Se (studiare) ___ di più, avresti superato l'esame. (Type 3)</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'avessi studiato')">✓</button>
</div>` },

                { id:'markers', title:'MARCATORI DEL DISCORSO', tag:'C1', level:'C1', content:`
<table class="conj-table"><tr><th>Marker</th><th>Meaning</th><th>Register</th><th>Example</th></tr>
<tr><td><strong>boh</strong></td><td>no idea, complete uncertainty</td><td>neutral/casual</td><td>"Boh, non lo so proprio."</td></tr>
<tr><td><strong>mah</strong></td><td>mild doubt, resignation, "well..."</td><td>thoughtful</td><td>"Mah, vedremo come va."</td></tr>
<tr><td><strong>cioè</strong></td><td>I mean, that is, clarification</td><td>very common</td><td>"È simpatico, cioè, non lo conosco bene ma..."</td></tr>
<tr><td><strong>comunque</strong></td><td>anyway, however, topic shift</td><td>neutral</td><td>"Comunque, tornando a noi..."</td></tr>
<tr><td><strong>tipo</strong></td><td>like, kind of (youth filler)</td><td>informal/youth</td><td>"È tipo una cosa strana, non so."</td></tr>
<tr><td><strong>magari</strong></td><td>maybe / if only / I wish!</td><td>universal</td><td>"Magari!" / "Magari viene anche lei."</td></tr>
<tr><td><strong>mica</strong></td><td>not at all, emphatic negation</td><td>colloquial</td><td>"Non è mica stupido." "Mica male!"</td></tr>
<tr><td><strong>dai</strong></td><td>come on, really, encouragement</td><td>very casual</td><td>"Dai, non fare così!" "Dai, ci credo!"</td></tr>
<tr><td><strong>vabbè</strong></td><td>okay/fine/whatever</td><td>informal</td><td>"Vabbè, facciamo così allora."</td></tr>
<tr><td><strong>insomma</strong></td><td>in short, so, well</td><td>neutral</td><td>"Insomma, non è andata benissimo."</td></tr>
<tr><td><strong>figurati</strong></td><td>don't mention it, of course</td><td>informal</td><td>"Grazie mille!" "Figurati!"</td></tr></table>` }
              ],
              french: [
                { id:'fr-art', title:'LES ARTICLES', tag:'A1', level:'A1', content:`
<p><strong>Definite:</strong> le (m.sg), la (f.sg), l' (before vowel), les (pl).<br><strong>Indefinite:</strong> un (m.sg), une (f.sg), des (pl).<br><strong>Partitive:</strong> du (m.sg = de + le), de la (f.sg), de l' (before vowel), des (pl).</p>
<p>After negation: des/du/de la → de: "Je n'ai pas de voiture." After quantity expressions: de only: "beaucoup de gens, un kilo de farine, trop de bruit."</p>
<div class="exercise-block">
  <div class="ex-q">Je bois ___ eau tous les matins.</div>
  <input class="ex-input" placeholder="article"> <button class="ex-btn" onclick="chk(this,'de l\'')">✓</button>
</div>` },
                { id:'fr-subj', title:'LE SUBJONCTIF', tag:'B2', level:'B2', content:`
<p><strong>Formation:</strong> ils-form present tense stem + -e/-es/-e/-ions/-iez/-ent.</p>
<div class="ipa-example">parler: ils parlent → que je parle, tu parles, il parle, nous parlions, vous parliez, ils parlent<br>faire: ils font → que je fasse, tu fasses, il fasse, nous fassions, vous fassiez, ils fassent<br>être: sois, soit, soyons, soyez, soient &nbsp;|&nbsp; avoir: aie, ait, ayons, ayez, aient</div>
<p><strong>Triggers:</strong> vouloir que, falloir que, il faut que, bien que, pour que, avant que, à moins que, il est important que, craindre que, regretter que, douter que.</p>
<div class="exercise-block">
  <div class="ex-q">Il faut que tu ___ (être) à l'heure.</div>
  <input class="ex-input" placeholder="verb"> <button class="ex-btn" onclick="chk(this,'sois')">✓</button>
</div>` }
              ],
              catalan: [
                { id:'ca-art', title:'ELS ARTICLES', tag:'A1', level:'A1', content:`
<p><strong>Definite:</strong> el (m.sg), la (f.sg), l' (before vowel or h), els (m.pl), les (f.pl).<br><strong>Indefinite:</strong> un (m.sg), una (f.sg), uns (m.pl), unes (f.pl).<br><strong>Contractions:</strong> a + el = al, de + el = del.</p>
<div class="ipa-example">el llibre, la taula, l'home, els amics, les noies<br>un home, una dona, uns amics, unes noies</div>` },
                { id:'ca-ser-estar', title:'SER I ESTAR', tag:'A2', level:'A2', content:`
<p><strong>Ser:</strong> identity, origin, profession, essential characteristics, time, impersonal expressions.<br><strong>Estar:</strong> location of people/objects, temporary states, progressive (estar + gerundi).</p>
<div class="ipa-example">Sóc italià. (I am Italian — identity) &nbsp;|&nbsp; Estic a Roma. (I'm in Rome — location)<br>Ell és metge. (He is a doctor) &nbsp;|&nbsp; Estic cansat. (I'm tired — state)<br>Estic menjant. (I'm eating — progressive)</div>
<div class="vocab-note">⚡ Key difference from Spanish: Catalan uses estar for LOCATION (Spanish uses estar too), but Catalan "ser" is used for some contexts where Spanish uses "estar" in certain regions.</div>` }
              ]
            };
            const langTopics = topics[lang] || topics.italian;
            return langTopics.map(t => {
              const isBasic = ['A1','A2'].includes(t.level);
              const userLevel = (state.languages[lang]||{}).level || 'A1-A2';
              const isAdvanced = userLevel.includes('C1') || userLevel.includes('C2');
              const dimmed = isBasic && isAdvanced && !state.showAllLevels;
              return `
                <div class="expandable-row${dimmed?' dimmed':''}" data-level="${t.level}" onclick="toggleExpand(this)">
                    <div class="expandable-row-header">
                        <span class="expandable-row-title">${t.title}${dimmed?' <span style=\'font-size:10px;color:var(--text-light)\'>basics</span>':''}</span>
                        <div class="expandable-row-meta">
                            <span class="progress-dot" id="dot-g-${t.id}"></span>
                            <span class="tag">${t.tag}</span>
                            <span class="arrow">→</span>
                        </div>
                    </div>
                    <div class="expandable-content">${t.content}</div>
                </div>`;
            }).join('');
        }

        
        function getDialogsContent() {
            const lang = state.currentLang;
            const allDialogs = {
              italian: [
                { id:'bar-mattina', title:'Al Bar — Mattina', level:'A2', category:'Vita Quotidiana',
                  lines:[
                    {s:'Barista',it:'Buongiorno, cosa prende?',en:'Good morning, what will you have?'},
                    {s:'Cliente',it:'Un cappuccino e un cornetto, per favore.',en:'A cappuccino and a croissant, please.'},
                    {s:'Barista',it:'Che tipo di cornetto? Vuoto, con la crema o con la marmellata?',en:'What kind? Plain, with cream or with jam?'},
                    {s:'Cliente',it:'Con la crema, grazie.',en:'With cream, thank you.'},
                    {s:'Barista',it:'Sono due euro. Paga alla cassa, per favore.',en:"That's two euros. Please pay at the register."}
                  ], vocab:'cornetto = croissant | crema = custard cream | paga alla cassa = pay at the register | vuoto = plain/empty'},
                { id:'bar-aperitivo', title:'Al Bar — Aperitivo', level:'B1', category:'Vita Quotidiana',
                  lines:[
                    {s:'Cliente',it:'Siamo in cinque. Cosa ci consiglia?',en:'There are five of us. What do you recommend?'},
                    {s:'Barista',it:"Vi consiglio l'aperitivo della casa: prosecco, olive, arachidi, patatine fritte e pizzette. Tutto compreso.",en:'I recommend the house aperitif: prosecco, olives, peanuts, fries, and mini pizzas. All included.'},
                    {s:'Cliente',it:"Perfetto, cinque aperitivi della casa. Si può fumare qui?",en:'Perfect, five house aperitivos. Can you smoke here?'},
                    {s:'Barista',it:"Solo ai tavoli all'aperto, mi dispiace.",en:"Only at the outdoor tables, I'm afraid."}
                  ], vocab:"consigliare = to recommend | arachidi = peanuts | all'aperto = outdoors | mi dispiace = I'm sorry"},
                { id:'mercato-pesce', title:'Al Mercato del Pesce', level:'B2', category:'Vita Quotidiana',
                  lines:[
                    {s:'Pescivendolo',it:'Serviamo il numero quarantotto!',en:'Serving number forty-eight!'},
                    {s:'Cliente',it:'Eccomi!',en:'Here I am!'},
                    {s:'Pescivendolo',it:'Buonasera signora, che le do?',en:'Good evening ma\'am, what can I get you?'},

            const dialogs = allDialogs[lang] || allDialogs.italian;

              <button class="filter-btn active" onclick="filterDialogs(this,'all')">All</button>
              ${categories.map(c=>`<button class="filter-btn" onclick="filterDialogs(this,'${c}')">${c}</button>`).join('')}

            html += dialogs.map(d => `

                  <div>
                    <span class="dialog-level-tag">${d.level}</span>
                    <span class="dialog-cat-tag">${d.category}</span>
                  </div>
                  <div class="dialog-card-title">${d.title}</div>
                  <span class="arrow">→</span>

                  </div>
                  <div class="dialog-lines" id="lines-${d.id}">

                    <div class="dlg-line">

                      <div class="dlg-text">

                        <div class="dlg-en">${l.en}</div>

                      </div>

                  </div>
                  <div class="dialog-vocab-box"><strong>Vocabolario:</strong> ${d.vocab}</div>
                </div>
              </div>`).join('');
            html += '</div>';
            return html;
        }

                ]

            const langRes = allResources[lang] || allResources.italian;
            const prefStyles = styles.length > 0 ? styles : ['youtube','podcasts','books','websites','tvfilm'];
            const categoryMap = {
              'YouTube': { key:'youtube', show: prefStyles.includes('YouTube') || prefStyles.includes('TV & Film') || styles.length===0 },
              'Podcasts': { key:'podcasts', show: prefStyles.includes('Podcasts') || styles.length===0 },
              'Websites': { key:'websites', show: prefStyles.includes('Websites') || prefStyles.includes('Apps') || styles.length===0 },
              'Books': { key:'books', show: prefStyles.includes('Books') || prefStyles.includes('Reading') || prefStyles.includes('Literature') || styles.length===0 },
              'TV & Film': { key:'tvfilm', show: prefStyles.includes('TV & Film') || prefStyles.includes('Immersion') || styles.length===0 }
            };

            let html = '';
            if (styles.length > 0) {
              html += `<div class="resources-note">Showing resources matched to your learning style. <a href="#" onclick="state.languages[state.currentLang].learningStyles=[];renderResources();return false;">Show all</a></div>`;
            }

            Object.entries(categoryMap).forEach(([cat, cfg]) => {
              if (!cfg.show || !langRes[cfg.key] || langRes[cfg.key].length === 0) return;
              html += `<div class="resource-section">
                <h3 class="resource-cat-title">${cat}</h3>
                <div class="resource-grid">
                ${langRes[cfg.key].map(r => `
                  <div class="resource-card">
                    <div class="resource-name">${r.url ? `<a href="${r.url}" target="_blank">${r.name}</a>` : r.name}</div>
                    <div class="resource-desc">${r.desc}</div>
                    <span class="resource-level">${r.level}</span>
                  </div>`).join('')}
                </div>
              </div>`;
            });
            return html || '<p style="color:var(--text-mid)">No resources available for this language yet.</p>';
        }

        function checkExercise(button, correctAnswer) {
            const input = button.previousElementSibling;
            const answer = input.value.trim().toLowerCase();
            const correct = correctAnswer.toLowerCase();

            if (answer === correct) {
                const feedback = document.createElement('div');
                feedback.className = 'exercise-feedback feedback-correct';
                feedback.textContent = '✓ Correct!';
                button.parentElement.appendChild(feedback);
                input.style.borderColor = '#2f7f2f';
            } else {
                const feedback = document.createElement('div');
                feedback.className = 'exercise-feedback feedback-incorrect';
                feedback.textContent = `✗ Incorrect. The answer is: ${correctAnswer}`;
                button.parentElement.appendChild(feedback);
                input.style.borderColor = 'var(--accent)';
            }
        }


        function switchLanguage(lang) {
            if (!state.languages[lang]) return;
            state.currentLang = lang;
            state.currentLanguage = lang;
            // Update nav badge
            const badges = { italian:'🇮🇹 IT', french:'🇫🇷 FR', catalan:'🏴 CA' };
            document.getElementById('lang-badge').textContent = badges[lang] || lang.toUpperCase();
            // Update greeting
            const greetings = { italian:'Ciao', french:'Bonjour', catalan:'Hola' };
            const nameEl = document.getElementById('welcome-name');
            if (nameEl) nameEl.textContent = `${greetings[lang]}, ${state.name}.`;
            // Re-render all sections
            renderLinguisticsContent();
            renderGrammarContent();
            renderDialogsContent();
            renderResourcesContent();
            renderJournalContent();
            // Close dropdown
            document.getElementById('lang-dropdown').classList.remove('open');
        }

        function renderResourcesContent() {
            const sec = document.getElementById('resourcesSection');
            if (sec) sec.innerHTML = getResourcesContent();
        }

        function filterDialogs(btn, cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.dialog-card').forEach(card => {
                card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
            });
        }

        function openDialog(id) {
            const body = document.getElementById('dlg-' + id);
            if (!body) return;
            const isOpen = body.style.display !== 'none';
            document.querySelectorAll('.dialog-body').forEach(b => b.style.display = 'none');
            if (!isOpen) body.style.display = 'block';
        }

        function toggleTranslations(id) {
            document.querySelectorAll(`#dlg-${id} .dlg-en`).forEach(el => {
                el.style.display = el.style.display === 'none' ? '' : 'none';
            });
        }

        function togglePractice(id) {
            const practiceInputs = document.querySelectorAll(`#dlg-${id} .dlg-practice-input`);
            const itLines = document.querySelectorAll(`#dlg-${id} .dlg-it`);
            const isPractice = practiceInputs[0] && practiceInputs[0].style.display !== 'none';
            // Every other line (speaker B = odd index) is the practice target
            practiceInputs.forEach((inp, i) => {
                if (i % 2 === 1) {
                    inp.style.display = isPractice ? 'none' : 'block';
                    if (itLines[i]) itLines[i].style.display = isPractice ? '' : 'none';
                }
            });
        }

        function checkDialogLine(btn, correct) {
            const input = btn.previousElementSibling;
            const ans = input.value.trim().toLowerCase();
            const ok = correct.toLowerCase();
            btn.textContent = ans === ok ? '✓' : '✗';
            btn.style.color = ans === ok ? '#2a7a2a' : 'var(--accent)';
        }

        function chk(btn, correct) {
            const input = btn.previousElementSibling;
            const ans = input.value.trim();
            const ok = correct.trim();
            const match = ans.toLowerCase() === ok.toLowerCase();
            const fb = btn.parentElement.querySelector('.ex-fb');
            if (fb) fb.remove();
            const div = document.createElement('div');
            div.className = 'ex-fb';
            div.style.cssText = `font-size:12px;margin-top:6px;padding:6px 10px;border-left:2px solid ${match?'#2a7a2a':'var(--accent)'}`;
            div.textContent = match ? '✓ Correct!' : `✗ Answer: ${correct}`;
            btn.parentElement.appendChild(div);
        }

        function toggleExpand(row) {
            const content = row.nextElementSibling;
            if (!content || !content.classList.contains('expandable-content')) return;
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            const arrow = row.querySelector('.arrow');
            if (arrow) arrow.textContent = isOpen ? '→' : '↓';
            // Mark progress dot
            const dot = row.querySelector('.progress-dot');
            if (dot && !isOpen) dot.classList.add('started');
        }

        // Initialize
        renderQuizStep();
    </script>
